<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Retângulo:</title>
</head>
<body>
    <main>
        <div>
            <h4>Área de Retângulo: Peça a base e a altura de um retângulo e exiba sua área (Base
x Altura).</h4>
          <p>Digite a Base do Retângulo:</p>
          <input type="number" name="base" id="base">
          <p>Digite a Altura do Retângulo:</p>
          <input type="number" name="altura" id="altura">
          <button id="btn" type="button">Calcular Área</button>
          <p id="resultado"></p>
        </div>
    </main>
</body>
</html>
<script src="script.js"></script>
