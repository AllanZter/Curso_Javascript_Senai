<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Idade:</title>
</head>
<body>
    <main>
        <div>
            <p>
                Calculadora de Idade: Receba o ano de nascimento do usuário e o ano atual.
                Calcule e mostre a idade aproximada.
            </p>
            <h4>Digite o Ano do Seu Nascimento:</h4>
            <input id="ano-nasc" type="number">
            <h4>Digite o Ano Atual:</h4>
            <input id="ano-atual" type="number">
            <button id="btn">Calcular</button>
            
            <p id="result"></p>

        </div>
    </main>
</body>
</html>
<script src="script.js"></script>
