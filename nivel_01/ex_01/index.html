<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Exercícios de Logica em JavaScript</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>    
    <main>
      <div>
        <p>Boas-vindas: Crie um algoritmo que receba o nome de um usuário e exiba a
mensagem: "Olá [nome], seja bem-vindo ao curso de Programação!".</p>
        <h4>Digite seu Nome:</h4>
        <input id="nome"  type="text">
        <button id="btn">Click Aqui</button>
        <p id="mensagem"></p>

      </div>
        
    </main>    
</body>
