</head>
<body>
    <h4>Calculadora de IMC: Receba peso e altura. Calcule o IMC (Peso / Altura2). Se o
IMC for maior que 25, exiba "Acima do peso".</h4>
<p>Digite seu peso:</p>
<input type="number"  id="peso">
<p>Digite sua altura:</p>
<input type="number"  id="altura">
<button id="btn" onclick="calcularIMC()">Calcular IMC</button>
<p id="resultado"></p>
</body>
